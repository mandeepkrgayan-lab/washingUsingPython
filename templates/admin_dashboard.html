<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            margin:20px;
            background:#f7f7f7;
        }

        h2{
            margin-bottom:15px;
        }

        #search{
            width:300px;
            padding:10px;
            margin-bottom:20px;
            font-size:16px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{
            background:#2196F3;
            color:white;
        }

        button{
            padding:7px 12px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .update-btn{
            background:#4CAF50;
            color:white;
        }

        .reset-btn{
            background:#f44336;
            color:white;
        }

        .add-btn{
            margin-top:20px;
            background:#2196F3;
            color:white;
            padding:10px 18px;
        }

        input[type=date]{
            padding:6px;
        }

    </style>

</head>

<body>

<h2>All Customers</h2>

<input
type="text"
id="search"
placeholder="🔍 Search by phone number..."
onkeyup="searchCustomer()">

<table id="customerTable">

<tr>
    <th>Phone</th>
    <th>Expiry</th>
    <th>PIN</th>
    <th>In Use</th>
    <th>Last Used</th>
    <th>Update Expiry</th>
    <th>Reset PIN</th>
</tr>

{% for phone, expiry, pin, in_use, used_at in users %}

<tr>

<td>{{ phone }}</td>

<td>{{ expiry }}</td>

<td>
{% if pin %}
{{ pin }}
{% else %}
<span style="color:red;">Not Set</span>
{% endif %}
</td>

<td>{{ in_use }}</td>

<td>{{ used_at }}</td>

<td>

<form method="POST" action="/update_user">

<input
type="hidden"
name="phone"
value="{{ phone }}">

<input
type="date"
name="new_expiry"
required>

<br><br>

<button
class="update-btn"
type="submit">
Update
</button>

</form>

</td>

<td>

<form
method="POST"
action="/reset_pin">

<input
type="hidden"
name="phone"
value="{{ phone }}">

<button
class="reset-btn"
type="submit">
Reset PIN
</button>

</form>

</td>

</tr>

{% endfor %}

</table>

<button
class="add-btn"
onclick="addCustomer()">
Add New Customer
</button>

<script>

function searchCustomer(){

    let input=document.getElementById("search");
    let filter=input.value.toUpperCase();

    let table=document.getElementById("customerTable");
    let tr=table.getElementsByTagName("tr");

    for(let i=1;i<tr.length;i++){

        let td=tr[i].getElementsByTagName("td")[0];

        if(td){

            let txt=td.textContent||td.innerText;

            if(txt.toUpperCase().indexOf(filter)>-1){
                tr[i].style.display="";
            }else{
                tr[i].style.display="none";
            }

        }

    }

}

function addCustomer(){

    const phone=prompt("Enter new customer phone number:");

    if(!phone)
        return alert("Phone number required");

    if(!/^[6-9][0-9]{9}$/.test(phone))
        return alert("Invalid phone number");

    const expiry=prompt("Enter expiry date (YYYY-MM-DD):");

    if(!expiry||!/^\d{4}-\d{2}-\d{2}$/.test(expiry))
        return alert("Invalid expiry format");

    fetch("/add_customer",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            phone:phone,
            expiry:expiry
        })

    })

    .then(res=>res.text())

    .then(msg=>{

        alert(msg);

        location.reload();

    })

    .catch(err=>{

        alert("Error : "+err);

    });

}

</script>

</body>
</html>
